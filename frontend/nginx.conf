# This is used by Dockerfile.release to serve the built Vue app with nginx in production.
# Nginx configuration for the React frontend 
# Needed because nginx serves static files and doesn't know about React Router.
# Without this, refreshing or directly accessing a route like /tasks would 404.

server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}