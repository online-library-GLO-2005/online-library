# Compile and exec 3 servers: frontend with React, backend with python Flask, and MySQL as database

services:
  backend:
    container_name: flask-container
    build:
      context: ./backend
      dockerfile: ./Dockerfiles/Dockerfile.dev
    ports:
      - '5000:5000'   #default flask port
    volumes:
      - ./backend:/app    # Mount code instead of rebuilding
      - ./backend/media:/app/media # Mount media for persistence and ease of access during development
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    container_name: react-container
    build:
      context: ./frontend
      dockerfile: ./Dockerfiles/Dockerfile.dev
    ports:
      - '3000:3000'   #default react port
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure

  db:
    image: mysql:8    # MySQL version 8
    container_name: mysql-container
    command: --event-scheduler=ON
    attach: false
    ports:
      - '3306:3306'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/db:/docker-entrypoint-initdb.d # Start bd with sql files in db folder in order
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: on-failure

volumes:
  mysql_data: